kind: pipeline
type: docker
name: laravel

trigger:
  branch:
    - master
    - main
  event:
    - push

steps:
  - name: test
    image: php:8.2-cli
    environment:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
    commands:
      - apt-get update && apt-get install -y git unzip libzip-dev libsqlite3-dev
      - docker-php-ext-install zip pdo_sqlite
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - cd docker/laravel
      - mkdir -p bootstrap/cache storage/framework/sessions storage/framework/views storage/framework/cache storage/logs
      - chmod -R 777 bootstrap/cache storage
      - composer install --no-interaction --no-scripts
      - cp .env.example .env
      - php artisan key:generate --force
      - ./vendor/bin/phpunit

  - name: build
    image: plugins/docker
    settings:
      repo: asdads6495/laravel
      tags:
        - ${DRONE_COMMIT_SHA:0:8}
        - latest
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_password
      dockerfile: docker/laravel/Dockerfile
      context: docker/laravel

  - name: deploy
    image: hashicorp/nomad:latest
    environment:
      NOMAD_ADDR: http://54.177.94.213:4646
      NOMAD_TOKEN:
        from_secret: nomad_token
    commands:
      - nomad job run -var="docker_image_tag=${DRONE_COMMIT_SHA:0:8}" jobs/laravel.nomad.hcl

