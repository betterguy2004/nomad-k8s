kind: pipeline
type: docker
name: laravel

trigger:
  branch:
    - master
    - main
  event:
    - push

steps:
  - name: test
    image: php:8.2-cli
    environment:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
    commands:
      - apt-get update && apt-get install -y git unzip libzip-dev
      - docker-php-ext-install zip
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - cd docker/laravel && composer install --no-interaction
      - cd docker/laravel && php artisan key:generate --force
      - cd docker/laravel && ./vendor/bin/phpunit

  - name: build
    image: plugins/docker
    settings:
      repo: asdads6495/laravel
      tags:
        - ${DRONE_COMMIT_SHA:0:8}
        - latest
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_password
      dockerfile: docker/laravel/Dockerfile
      context: docker/laravel

  - name: deploy
    image: asdads6495/nomad-deploy
    environment:
      NOMAD_ADDR: http://nomad.service.consul:4646
      NOMAD_TOKEN:
        from_secret: nomad_token
    commands:
      - |
        nomad job run \
          -var="docker_image_tag=${DRONE_COMMIT_SHA:0:8}" \
          -var-file=jobs/vars/dev.vars \
          jobs/laravel.nomad.hcl

---
kind: secret
name: dockerhub_username
get:
  path: secret/data/drone
  name: dockerhub_username

---
kind: secret
name: dockerhub_password
get:
  path: secret/data/drone
  name: dockerhub_password

---
kind: secret
name: nomad_token
get:
  path: secret/data/drone
  name: nomad_token
